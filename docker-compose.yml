services:
  postgres:
    image: postgres:16-alpine
    container_name: sindiancora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sindiancora
      POSTGRES_USER: sindiancora
      POSTGRES_PASSWORD: sindiancora
    ports:
      - "5432:5432"
    volumes:
      - sindiancora_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sindiancora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  sindiancora_pgdata:
